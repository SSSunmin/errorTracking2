<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini-Sentry SDK Demo</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
      input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
      button { padding: 0.5rem 0.75rem; margin: 0.25rem 0.25rem 0.25rem 0; cursor: pointer; }
      pre { background: #111; color: #0f0; padding: 1rem; border-radius: 6px; min-height: 6rem; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>Mini-Sentry SDK Demo</h1>
    <p>Paste a project DSN, initialise, then trigger events.</p>
    <input id="dsn" placeholder="http://&lt;publicKey&gt;@localhost:4100/&lt;projectId&gt;" />
    <button id="init">Init SDK</button>
    <div>
      <button id="throw">Throw uncaught error</button>
      <button id="capture">Capture handled exception</button>
      <button id="message">Send message</button>
    </div>
    <pre id="log"></pre>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
