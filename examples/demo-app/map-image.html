<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini-Sentry — 지도 이미지 캡처 증명 (로컬)</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem; }
      .row { display: flex; gap: 1.5rem; flex-wrap: wrap; }
      .col { flex: 1 1 380px; border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem; }
      .map { width: 100%; height: 240px; border: 1px solid #ccc; }
      button { padding: 0.5rem 0.8rem; margin: 0.6rem 0.4rem 0.4rem 0; cursor: pointer; }
      .preview { width: 100%; min-height: 120px; margin-top: 0.5rem; border: 1px dashed #bbb; background:
        repeating-conic-gradient(#f4f4f4 0% 25%, #fff 0% 50%) 50% / 16px 16px; }
      .meta { font-size: 0.9rem; color: #333; margin-top: 0.4rem; white-space: pre-wrap; }
      h2 { font-size: 1.05rem; }
      pre { background: #111; color: #0f0; padding: 0.75rem; border-radius: 6px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>지도 이미지 캡처 — 로컬 증명</h1>
    <p>
      동일한 지도를 <b>preserveDrawingBuffer</b> 켠 것과 끈 것으로 각각 띄운다.
      아래 캡처 버튼을 누르면 지도 캔버스를 축소·JPEG로 뽑아 미리보기로 보여준다.
      <b>켠 쪽만 실제 지도 이미지가 나오고, 끈 쪽은 검게(빈 이미지) 나오는 것</b>을 눈으로 확인하는 게 목적.
    </p>
    <div class="row">
      <div class="col">
        <h2>① preserveDrawingBuffer: <b>true</b> (권장)</h2>
        <div id="map-a" class="map"></div>
        <button id="cap-a" disabled>이 지도 캡처</button>
        <img id="preview-a" class="preview" alt="캡처 미리보기 A" />
        <div id="meta-a" class="meta"></div>
      </div>
      <div class="col">
        <h2>② preserveDrawingBuffer: <b>false</b> (기본값)</h2>
        <div id="map-b" class="map"></div>
        <button id="cap-b" disabled>이 지도 캡처</button>
        <img id="preview-b" class="preview" alt="캡처 미리보기 B" />
        <div id="meta-b" class="meta"></div>
      </div>
    </div>
    <pre id="log"></pre>
    <script type="module" src="/src/map-image.ts"></script>
  </body>
</html>
