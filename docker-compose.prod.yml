# Mini-Sentry production stack: postgres + redis + (migrate) + server + worker + caddy.
# Dev compose (docker-compose.yml) is untouched; that one only runs PG+Redis on
# host ports. This prod stack exposes ONLY 80/443 (Caddy); DB/Redis/server stay
# on the internal network.
#   cp .env.prod.example .env.prod   # then fill in domains + secrets
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
# --env-file is REQUIRED: it drives ${VAR} interpolation (caddy build args +
# caddy/server/worker env). `env_file:` below only injects vars into the running
# container — it does NOT populate compose's ${...} substitution.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # One-shot: apply pending migrations once, then exit. server/worker wait for
  # it to complete successfully (depends_on condition) so migrations never race
  # across multiple app instances and don't re-run on every boot.
  migrate:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    image: mini-sentry-server
    restart: "no"
    env_file: .env.prod
    command: ["npx", "prisma", "migrate", "deploy", "--schema=prisma/schema.prisma"]
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    image: mini-sentry-server
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${API_PORT:-4000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # CMD from the image runs `node dist/index.js` (the API).

  worker:
    image: mini-sentry-server
    restart: unless-stopped
    env_file: .env.prod
    command: ["node", "dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  caddy:
    build:
      context: .
      dockerfile: deploy/Dockerfile.dashboard
      args:
        # Build-time: Vite inlines VITE_REPLAY_ORIGIN into the bundle.
        VITE_REPLAY_ORIGIN: ${VITE_REPLAY_ORIGIN}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Runtime: Caddyfile reads these for its two site blocks + /api proxy port.
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN}
      REPLAY_DOMAIN: ${REPLAY_DOMAIN}
      API_PORT: ${API_PORT:-4000}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
